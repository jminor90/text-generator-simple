<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Script Generator</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 2rem auto; padding: 0 1rem; line-height: 1.6; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; font-weight: bold; font-size: 0.9rem; }
        input { width: 100%; padding: 0.5rem; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        
        #outputArea { margin-top: 2rem; padding: 1.5rem; background: #eef; border-radius: 8px; border-left: 5px solid #007bff; }
        #scriptDisplay { width: 100%; min-height: 120px; padding: 10px; border: 1px dashed #007bff; background: white; font-family: inherit; }
        
        .btn-group { margin-top: 1rem; display: flex; gap: 10px; }
        button { padding: 0.6rem 1rem; cursor: pointer; border: none; border-radius: 4px; background: #007bff; color: white; }
        button:hover { opacity: 0.9; }
        .edit-btn { background: #6c757d; }
    </style>
</head>
<body>

    <h2>Script Generator</h2>

    <div class="form-group"><label>User Name:</label><input type="text" id="userName" oninput="updateScript()"></div>
    <div class="form-group"><label>Venue:</label><input type="text" id="venue" oninput="updateScript()"></div>
    <div class="form-group"><label>Location:</label><input type="text" id="location" oninput="updateScript()"></div>
    <div class="form-group"><label>Time:</label><input type="text" id="time" oninput="updateScript()"></div>
    <div class="form-group"><label>Host:</label><input type="text" id="host" oninput="updateScript()"></div>

    <div id="outputArea">
        <label>Generated Script:</label>
        <textarea id="scriptDisplay" readonly></textarea>
        
        <div class="btn-group">
            <button onclick="copyToClipboard()">Copy to Clipboard</button>
            <button class="edit-btn" id="editBtn" onclick="toggleEdit()">Enable Edit</button>
        </div>
    </div>

    <script>
        function updateScript() {
            const userName = document.getElementById('userName').value || "[User Name]";
            const venue = document.getElementById('venue').value || "<Venue>";
            const location = document.getElementById('location').value || "<Location>";
            const time = document.getElementById('time').value || "<Time>";
            const host = document.getElementById('host').value || "<Host>";

            const script = `Hi, this is ${userName} from the Living Trust Seminar. I am texting to confirm your attendance for the seminar over at ${venue} in ${location} at ${time} tomorrow. ${host} will be your seminar host and looks forward to meeting you! Can you please confirm that you'll be able to attend?`;
            
            document.getElementById('scriptDisplay').value = script;
        }

        function toggleEdit() {
            const area = document.getElementById('scriptDisplay');
            const btn = document.getElementById('editBtn');
            
            if (area.hasAttribute('readonly')) {
                area.removeAttribute('readonly');
                btn.innerText = "Lock Edit";
                area.style.borderStyle = "solid";
            } else {
                area.setAttribute('readonly', true);
                btn.innerText = "Enable Edit";
                area.style.borderStyle = "dashed";
            }
        }

        function copyToClipboard() {
            const area = document.getElementById('scriptDisplay');
            area.select();
            document.execCommand('copy');
            /*alert("Copied to clipboard!");*/
        }

        // Initialize display on load
        updateScript();
    </script>
</body>
</html>
